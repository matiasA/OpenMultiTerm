name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PRERELEASE=""
          if [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"alpha"* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes $PRERELEASE || true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: --win
          - os: macos-latest
            platform: --mac
          - os: ubuntu-latest
            platform: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3 make g++ libsecret-1-dev rpm

      - run: npm ci

      - name: Build app
        run: npm run build

      - name: Package
        run: npx electron-builder ${{ matrix.platform }} --publish never

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          find release -maxdepth 1 -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.blockmap" -o -name "latest*.yml" \) -print0 | xargs -0 gh release upload "$TAG" --clobber
