name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: --win
          - os: macos-latest
            platform: --mac
          - os: ubuntu-latest
            platform: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3 make g++ libsecret-1-dev rpm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.platform }} --publish always
